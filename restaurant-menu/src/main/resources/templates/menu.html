<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Roboto',sans-serif;
            background-color:#fff8f0;
            color:#333;
            margin:0;
            padding:0;
        }

        h2{
            text-align:center;
            padding:20px;
            color:#d35400;
        }

        table{
            border-collapse:collapse;
            width:80%;
            margin:0 auto 40px auto;
            box-shadow:0 2px 8px rgba(0,0,0,0.15);
        }

        th,td{
            padding:12px 15px;
            text-align:left;
        }

        th{
            background-color:#f39c12;
            color:white;
            text-transform:uppercase;
        }

        tr:nth-child(even){
            background-color:#fdf2e3;
        }

        /* форма додавання */
        .add-form{
            width:80%;
            margin:0 auto 50px auto;
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            justify-content:center;
            align-items:center;
            background-color:#f9e5d8;
            padding:15px;
            border-radius:8px;
            box-shadow:0 1px 6px rgba(0,0,0,0.1);
        }

        input,select{
            padding:8px;
            border:1px solid #ccc;
            border-radius:4px;
        }

        /* кнопки */
        button{
            padding:8px 16px;
            background-color:#d35400;
            color:white;
            border:none;
            border-radius:4px;
            cursor:pointer;
            transition:0.2s;
        }

        button:hover{
            background-color:#e67e22;
        }

        .delete-btn{
            background-color:#c0392b;
        }

        .delete-btn:hover{
            background-color:#e74c3c;
        }

        /* контейнер кнопок */
        .actions{
            display:flex;
            gap:6px;
        }

        /* форми всередині таблиці */
        .actions form{
            margin:0;
        }
    </style>
</head>

<body>

<h2>Restaurant Menu</h2>

<div style="text-align:center; margin-bottom:20px;">
    <a href="/categories">
        <button type="button">Manage Categories</button>
    </a>
</div>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Category</th>
        <th>Price (UAH)</th>
        <th>Price (USD)</th>
        <th>Action</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="item : ${menuItems}">
        <td th:text="${item.name}"></td>
        <td th:text="${item.description}"></td>
        <td th:text="${item.categoryName}"></td>
        <td th:text="${item.priceUah}"></td>
        <td th:text="${item.priceUsd}"></td>

        <td>
            <div class="actions">

                <form th:action="@{/menu/edit/{id}(id=${item.id})}" method="get">
                    <button type="submit">Edit</button>
                </form>

                <form th:action="@{/menu/delete/{id}(id=${item.id})}" method="post">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit" class="delete-btn">Delete</button>
                </form>

            </div>
        </td>

    </tr>

    </tbody>
</table>


<h3 style="text-align:center;">Add New Dish</h3>

<form class="add-form" th:action="@{/menu/add}" method="post">

    <input type="text" name="name" placeholder="Dish Name" required/>

    <input type="text" name="description" placeholder="Description" required/>

    <input type="number" name="priceUah" placeholder="Price UAH" step="0.01" min="1" required/>

    <select name="categoryId" required>
        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}">
        </option>
    </select>

    <button type="submit">Add Dish</button>

</form>

</body>
</html>
