<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Edit Dish</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <style>

        body{
        font-family:'Roboto',sans-serif;
        background-color:#fff8f0;
        color:#333;
        margin:0;
        padding:0;
        }

        h2{
        text-align:center;
        padding:20px;
        color:#d35400;
        }

        form{
        width:50%;
        margin:40px auto;
        display:flex;
        flex-direction:column;
        gap:12px;
        background-color:#f9e5d8;
        padding:25px;
        border-radius:8px;
        box-shadow:0 2px 8px rgba(0,0,0,0.1);
        }

        input,select{
        padding:10px;
        border:1px solid #ccc;
        border-radius:4px;
        }

        button{
        padding:10px 20px;
        background-color:#d35400;
        color:white;
        border:none;
        border-radius:4px;
        cursor:pointer;
        transition:0.2s;
        }

        button:hover{
        background-color:#e67e22;
        }

    </style>

</head>

<body>

<h2>Edit Dish</h2>

<form th:action="@{/menu/edit/{id}(id=${menuItem.id})}" method="post">

    <input type="text"
           name="name"
           th:value="${menuItem.name}"
           required/>

    <input type="text"
           name="description"
           th:value="${menuItem.description}"
           required/>

    <input type="number"
           name="priceUah"
           th:value="${menuItem.priceUah}"
           step="0.01"
           min="1"
           required/>

    <select name="categoryId" required>

        <option th:each="cat : ${categories}"
                th:value="${cat.id}"
                th:text="${cat.name}"
                th:selected="${cat.id == menuItem.category.id}">
        </option>

    </select>

    <button type="submit">Update Dish</button>

</form>

</body>
</html>
